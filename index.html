<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rachel Moore Floral Design</title>
  <link rel="stylesheet" href="styles/scratch.css">
  <style>
    body{background:#1c1418}
    .opening-shell{
      min-height:100vh;
      max-width:none;
      padding:24px;
      display:grid;
      place-items:center;
      background:
        linear-gradient(rgba(26,18,23,0.6), rgba(26,18,23,0.65)),
        url('image/bqcloseup.JPG') center/cover no-repeat;
    }
    .opening-card{
      width:min(820px, 100%);
      padding:52px 42px;
      text-align:center;
      background:rgba(255, 253, 251, 0.9);
      border:1px solid rgba(255,255,255,0.55);
      border-radius:24px;
      box-shadow:0 24px 50px rgba(0,0,0,0.22);
    }
    .opening-card h1{
      font-size:clamp(2.3rem, 6vw, 4.8rem);
      margin:0 0 14px;
      line-height:1.05;
      letter-spacing:0.06em;
      text-transform:uppercase;
    }
    .opening-card p{margin:0 auto 28px; max-width:620px}
    .opening-card .lead{font-weight:500; letter-spacing:0.01em}
    .opening-actions{display:flex; flex-wrap:wrap; justify-content:center; gap:14px}
    .opening-actions .button{padding:14px 22px; font-size:1rem}
    @media (max-width:700px){
      .opening-card{padding:34px 22px}
      .opening-actions{flex-direction:column}
      .opening-actions .button{width:100%}
    }
  </style>
</head>
<body>
  <main class="page opening-shell">
    <section class="panel opening-card">
      <span class="eyebrow">Welcome</span>
      <h1>Rachel Moore Floral Design</h1>
      <div class="opening-actions">
        <a class="button" href="about.html">About Me/Contact</a>
        <a class="button" href="portfolio.html">Portfolio</a>
        <a class="button" href="resume.html">Resume</a>
      </div>
    </section>
  </main>
</body>
</html>
